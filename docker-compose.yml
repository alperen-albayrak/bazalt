services:
  # ── Postgres ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bazalt
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bazalt_dev}
      POSTGRES_DB: bazalt
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bazalt"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── SeaweedFS master ──────────────────────────────────────────────────────
  # SeaweedFS image has no shell tools (wget/curl/nc); healthcheck uses the
  # weed binary itself to probe the HTTP port via a shell-less TCP connect.
  seaweedfs-master:
    image: chrislusf/seaweedfs:latest
    restart: unless-stopped
    command: master -mdir=/data -defaultReplication=000
    volumes:
      - seaweedfs_master:/data
    # No healthcheck — weed image has no wget/curl/nc.
    # Dependent services use restart:unless-stopped to reconnect on startup.

  # ── SeaweedFS volume ──────────────────────────────────────────────────────
  seaweedfs-volume:
    image: chrislusf/seaweedfs:latest
    restart: unless-stopped
    command: volume -mserver=seaweedfs-master:9333 -dir=/data -port=8080
    depends_on:
      - seaweedfs-master
    volumes:
      - seaweedfs_volume:/data

  # ── SeaweedFS S3 gateway ──────────────────────────────────────────────────
  seaweedfs-s3:
    image: chrislusf/seaweedfs:latest
    restart: unless-stopped
    command: s3 -filer=seaweedfs-filer:8888 -port=8333 -config=/etc/seaweedfs/s3.json
    depends_on:
      - seaweedfs-filer
    ports:
      - "8333:8333"
    volumes:
      - ./seaweedfs-s3.json:/etc/seaweedfs/s3.json:ro

  # ── SeaweedFS filer ───────────────────────────────────────────────────────
  seaweedfs-filer:
    image: chrislusf/seaweedfs:latest
    restart: unless-stopped
    command: filer -master=seaweedfs-master:9333 -port=8888
    depends_on:
      - seaweedfs-master
    volumes:
      - seaweedfs_filer:/data

  # ── Bazalt server ─────────────────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      args:
        # Leave empty (default) — SPA and API share the same origin via nginx.
        # Override to e.g. https://api.example.com when hosting SPA on a CDN.
        VITE_API_URL: ${VITE_API_URL:-}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://bazalt:${POSTGRES_PASSWORD:-bazalt_dev}@postgres:5432/bazalt
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      S3_ENDPOINT: http://seaweedfs-s3:8333
      S3_BUCKET: bazalt
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-bazalt}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-bazalt_secret}
      SPA_PATH: /app/spa
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  # ── Nginx reverse proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      server:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  seaweedfs_master:
  seaweedfs_volume:
  seaweedfs_filer:
