<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Outer silhouette — regular heptagon, flat edge on top, symmetric -->
  <!-- Outer vertices R=29 from center (32,32), angles clockwise from top:
       V0=-25.71°  V1=+25.71°  V2=+77.14°  V3=+128.57°
       V4=+180°    V5=+231.43°  V6=+282.86°                -->
  <polygon points="19.4,5.9 44.6,5.9 60.3,25.5 54.7,50.1 32,61 9.3,50.1 3.7,25.5"
           fill="#111316"/>

  <!-- Crown facets: outer edge → inner ring (R=15) -->
  <!-- Inner vertices IV0–IV6 at same angles, R=15:
       IV0=25.5,18.5  IV1=38.5,18.5  IV2=46.6,28.7
       IV3=43.7,41.4  IV4=32,47      IV5=20.3,41.4  IV6=17.4,28.7 -->

  <!-- Top crown — flat horizontal face, catches most light -->
  <polygon points="19.4,5.9 44.6,5.9 38.5,18.5 25.5,18.5" fill="#8294a8"/>

  <!-- Upper-right crown -->
  <polygon points="44.6,5.9 60.3,25.5 46.6,28.7 38.5,18.5" fill="#667080"/>

  <!-- Right crown -->
  <polygon points="60.3,25.5 54.7,50.1 43.7,41.4 46.6,28.7" fill="#4e5663"/>

  <!-- Lower-right crown -->
  <polygon points="54.7,50.1 32,61 32,47 43.7,41.4" fill="#3a4049"/>

  <!-- Lower-left crown (darkest — shadow side) -->
  <polygon points="32,61 9.3,50.1 20.3,41.4 32,47" fill="#1e2125"/>

  <!-- Left crown -->
  <polygon points="9.3,50.1 3.7,25.5 17.4,28.7 20.3,41.4" fill="#2b3038"/>

  <!-- Upper-left crown (faces light source) -->
  <polygon points="3.7,25.5 19.4,5.9 25.5,18.5 17.4,28.7" fill="#4e5663"/>

  <!-- Table — inner heptagon, central face -->
  <polygon points="25.5,18.5 38.5,18.5 46.6,28.7 43.7,41.4 32,47 20.3,41.4 17.4,28.7"
           fill="#3a4049"/>

  <!-- Upper table highlight -->
  <polygon points="25.5,18.5 38.5,18.5 35.5,23 28.5,23" fill="#5e6b7a"/>
</svg>
